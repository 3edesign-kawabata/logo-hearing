<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロゴデザイン ヒアリングシート | 3e design</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>ロゴデザイン ヒアリングシート</h1>
    </div>
  </header>

  <main class="container">
    <form id="hearing-form" autocomplete="off">

      <!-- 1. 基本情報 -->
      <section class="form-section">
        <h2 class="section-title">基本情報</h2>
        <div class="field">
          <label for="company">会社名・屋号・店名</label>
          <textarea id="company" name="company" rows="1"></textarea>
        </div>
        <div class="field">
          <label for="contact">担当者名</label>
          <textarea id="contact" name="contact" rows="1"></textarea>
        </div>
        <div class="field">
          <label for="business">業種・事業内容</label>
          <textarea id="business" name="business" rows="2"></textarea>
        </div>
        <div class="field field--short">
          <label for="meeting_date">対面日</label>
          <input type="date" id="meeting_date" name="meeting_date">
        </div>
      </section>

      <!-- 2. 制作の目的 -->
      <section class="form-section">
        <h2 class="section-title">制作の目的</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="purpose" value="new">
            <span>新規事業・開業</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="renewal">
            <span>既存事業のリニューアル</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="expansion">
            <span>展開用（サブブランドなど）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="trace">
            <span>トレース・再構築</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="other">
            <span>その他</span>
          </label>
        </div>

        <!-- その他テキスト -->
        <div id="purpose-other-field" class="sub-section hidden">
          <div class="field">
            <label>具体的な内容</label>
            <textarea name="purpose_other" rows="2" placeholder="制作の目的を具体的にお聞かせください"></textarea>
          </div>
        </div>

        <!-- トレース専用項目 -->
        <div id="trace-fields" class="sub-section hidden">
          <div class="field">
            <label>元データの状態</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="original_data" value="image_only">
                <span>画像のみ</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="original_data" value="ai_data">
                <span>AIデータあり</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="original_data" value="handwritten">
                <span>手書き原稿</span>
              </label>
            </div>
          </div>
          <div class="field">
            <label>トレースの精度希望</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="trace_precision" value="simple">
                <span>簡易</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="trace_precision" value="precise">
                <span>精密</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="trace_precision" value="consult">
                <span>要相談</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- 3. ロゴの構成（トレース以外で表示） -->
      <section class="form-section" id="logo-structure-section">
        <h2 class="section-title">ロゴの構成</h2>
        <div class="field">
          <label>ロゴの種類</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="logo_type" value="logotype">
              <span>ロゴタイプのみ</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="logo_type" value="symbol">
              <span>シンボルマーク単体</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="logo_type" value="symbol_logotype">
              <span>シンボルマーク＋ロゴタイプ</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="logo_type" value="corporate">
              <span>コーポレートロゴ</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="logo_type" value="undecided">
              <span>まだ決まっていない</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label>仕様書</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="spec_doc" value="needed">
              <span>必要（+50,000円〜）</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="spec_doc" value="not_needed">
              <span>不要</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="spec_doc" value="consult">
              <span>要相談</span>
            </label>
          </div>
        </div>
      </section>

      <!-- 4. 予算の目安 -->
      <section class="form-section">
        <h2 class="section-title">予算の目安（参考）</h2>
        <div id="budget-display" class="budget-display">
          <span class="budget-placeholder">制作の目的とロゴの構成を選択すると参考金額が表示されます</span>
        </div>
      </section>

      <!-- 5. 使用用途 -->
      <section class="form-section">
        <h2 class="section-title">使用用途</h2>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="new_business">
            <span>新規事業</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="business_card">
            <span>名刺</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="signage">
            <span>看板</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="web">
            <span>ウェブ</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="sns">
            <span>SNS</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="print">
            <span>印刷物</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="usage" value="other" id="usage-other">
            <span>その他</span>
          </label>
        </div>
        <div id="usage-other-field" class="sub-section hidden">
          <div class="field">
            <label>その他の用途</label>
            <textarea name="usage_other_text" rows="2" placeholder="具体的な用途を入力してください"></textarea>
          </div>
        </div>
      </section>

      <!-- 6. 納期の希望 -->
      <section class="form-section">
        <h2 class="section-title">納期の希望</h2>
        <div class="field field--short">
          <label for="deadline_date">希望日</label>
          <input type="date" id="deadline_date" name="deadline_date">
        </div>
        <div class="field">
          <label for="deadline_note">補足・備考</label>
          <textarea id="deadline_note" name="deadline_note" rows="1" placeholder="例：〇月中、急ぎ、相談したい　など"></textarea>
        </div>
      </section>

      <!-- 7. ブランドカラー -->
      <section class="form-section">
        <h2 class="section-title">ブランドカラー</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="brand_color" value="has_color">
            <span>すでに使っている色がある</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="brand_color" value="no_color">
            <span>まだ決まっていない</span>
          </label>
        </div>

        <!-- カラーピッカー -->
        <div id="color-picker-fields" class="sub-section hidden">
          <div class="field">
            <div class="color-picker-row">
              <div class="color-picker-item">
                <label for="color_main">メインカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_main" name="color_main" value="#cccccc">
                  <input type="text" id="code_main" name="code_main" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
              <div class="color-picker-item">
                <label for="color_sub">サブカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_sub" name="color_sub" value="#cccccc">
                  <input type="text" id="code_sub" name="code_sub" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
              <div class="color-picker-item">
                <label for="color_accent">アクセントカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_accent" name="color_accent" value="#cccccc">
                  <input type="text" id="code_accent" name="code_accent" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
            </div>
          </div>
          <div class="field">
            <label for="color_note">補足コメント</label>
            <textarea id="color_note" name="color_note" rows="1" placeholder="例：Webで使っているカラーコードなど"></textarea>
          </div>
        </div>

        <!-- 好みの色イメージ -->
        <div id="color-preference-fields" class="sub-section hidden">
          <div class="field">
            <label for="color_image">好みの色のイメージ</label>
            <textarea id="color_image" name="color_image" rows="2" placeholder="例：暖色系、落ち着いた色など"></textarea>
          </div>
          <div class="field">
            <label for="color_avoid">避けたい色</label>
            <textarea id="color_avoid" name="color_avoid" rows="2"></textarea>
          </div>
        </div>
      </section>

      <!-- 8. デザインの方向性 -->
      <section class="form-section">
        <h2 class="section-title">デザインの方向性</h2>
        <div class="field">
          <label for="image_words">イメージワード</label>
          <textarea id="image_words" name="image_words" rows="2" placeholder="例：シンプル、信頼感、やわらかい"></textarea>
        </div>
        <div class="field">
          <label for="reference">参考にしたいロゴや雰囲気（URL・フリーテキスト）</label>
          <textarea id="reference" name="reference" rows="2"></textarea>
        </div>
        <div class="field">
          <label for="competitor">競合・同業他社のロゴ（似てほしくない基準として）</label>
          <textarea id="competitor" name="competitor" rows="2"></textarea>
        </div>
        <div class="field">
          <label for="avoid_design">避けたいデザインの傾向</label>
          <textarea id="avoid_design" name="avoid_design" rows="2"></textarea>
        </div>
      </section>

      <!-- 9. ターゲット・想い -->
      <section class="form-section">
        <h2 class="section-title">ターゲット・想い</h2>
        <div class="field">
          <label for="target">誰に届けたいか</label>
          <textarea id="target" name="target" rows="2"></textarea>
        </div>
        <div class="field">
          <label for="impression">ロゴを見た人にどう感じてほしいか</label>
          <textarea id="impression" name="impression" rows="2" placeholder="例：信頼感、親しみやすさ、高級感"></textarea>
        </div>
        <div class="field">
          <label for="values">大切にしていること・伝えたいこと</label>
          <textarea id="values" name="values" rows="2"></textarea>
        </div>
        <div class="field">
          <label for="meaning">ロゴに込めたい意味やこだわり</label>
          <textarea id="meaning" name="meaning" rows="2"></textarea>
        </div>
      </section>

      <!-- 10. その他 -->
      <section class="form-section">
        <h2 class="section-title">その他</h2>
        <div class="field">
          <label for="notes">備考・自由記入</label>
          <textarea id="notes" name="notes" rows="4"></textarea>
        </div>
      </section>

      <!-- 11. 支払い -->
      <section class="form-section">
        <h2 class="section-title">支払い</h2>
        <div class="field">
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="payment" value="cash_on_delivery">
              <span>納品時現金</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="payment" value="transfer_first">
              <span>振込確認後納品</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="payment" value="consult">
              <span>要相談</span>
            </label>
          </div>
          <div id="payment-consult-field" class="sub-section hidden">
            <div class="field">
              <textarea name="payment_note" rows="1" placeholder="詳細をご記入ください"></textarea>
            </div>
          </div>
        </div>
        <div class="field">
          <label>納品方法</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="delivery" value="usb">
              <span>USB</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="delivery" value="email">
              <span>メール</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="delivery" value="line">
              <span>LINE</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="delivery" value="online_storage">
              <span>ギガファイル便などオンラインストレージ</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="delivery" value="other" id="delivery-other">
              <span>その他</span>
            </label>
          </div>
          <div id="delivery-other-field" class="sub-section hidden">
            <div class="field">
              <label>その他の納品方法</label>
              <textarea name="delivery_other_text" rows="1" placeholder="具体的な納品方法を入力してください"></textarea>
            </div>
          </div>
        </div>
      </section>

    </form>

    <!-- PDFボタン -->
    <div class="print-action no-print">
      <button type="button" id="pdf-btn" onclick="window.print()">PDFで保存する</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
